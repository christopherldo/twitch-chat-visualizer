version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: twitch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - twitch-net

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: twitch-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
    depends_on:
      - redis
    networks:
      - twitch-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: twitch-web
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - twitch-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:

networks:
  twitch-net:
    driver: bridge